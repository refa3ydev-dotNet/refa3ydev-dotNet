<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" width="1600" height="520" role="img" aria-label="Omar Refaey animated developer banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="55%" stop-color="#071427"/>
      <stop offset="100%" stop-color="#0a1b34"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#2563eb" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#dbeafe"/>
      <stop offset="70%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .mono { font-family: JetBrains Mono, Fira Code, Consolas, monospace; }
      .small { font-size: 14px; }
      .muted { fill: #93c5fd; }
      .panel { fill: #08111f; fill-opacity: .68; stroke: #38bdf8; stroke-opacity: .28; stroke-width: 1.5; }
      .gridLine { stroke: #1d4ed8; stroke-opacity: .14; stroke-width: 1; }
      .pulse { animation: pulse 3.2s ease-in-out infinite; }
      .float { animation: float 5s ease-in-out infinite; }
      .float2 { animation: float 6s ease-in-out infinite reverse; }
      .dashMove { stroke-dasharray: 10 16; animation: dash 6s linear infinite; }
      .spark { animation: spark 2.8s ease-in-out infinite; }
      .scan { animation: scan 4.8s linear infinite; }
      .typing1 { animation: type1 8s steps(30) infinite; }
      .typing2 { animation: type2 8s steps(34) infinite; }
      .typing3 { animation: type3 8s steps(27) infinite; }
      .blink { animation: blink 1s steps(2) infinite; }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes float { 0%,100% { transform: translateY(0px);} 50% { transform: translateY(-8px);} }
      @keyframes dash { to { stroke-dashoffset: -200; } }
      @keyframes spark { 0%,100% { opacity: .15; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.25); } }
      @keyframes scan { from { transform: translateY(-90px);} to { transform: translateY(210px);} }
      @keyframes blink { 0%,45% { opacity: 1; } 46%,100% { opacity: 0; } }
      @keyframes type1 { 0% { clip-path: inset(0 100% 0 0); } 22%,100% { clip-path: inset(0 0 0 0); } }
      @keyframes type2 { 0%,28% { clip-path: inset(0 100% 0 0); } 52%,100% { clip-path: inset(0 0 0 0); } }
      @keyframes type3 { 0%,58% { clip-path: inset(0 100% 0 0); } 78%,100% { clip-path: inset(0 0 0 0); } }
    </style>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <rect width="1600" height="520" fill="url(#centerGlow)"/>

  <!-- subtle grid -->
  <g>
    <path class="gridLine" d="M0 65H1600 M0 130H1600 M0 195H1600 M0 260H1600 M0 325H1600 M0 390H1600 M0 455H1600"/>
    <path class="gridLine" d="M100 0V520 M200 0V520 M300 0V520 M400 0V520 M500 0V520 M600 0V520 M700 0V520 M800 0V520 M900 0V520 M1000 0V520 M1100 0V520 M1200 0V520 M1300 0V520 M1400 0V520 M1500 0V520"/>
  </g>

  <!-- background circuit lines -->
  <g fill="none" filter="url(#glow)">
    <path d="M0 420 C160 390,220 340,320 340 H510" stroke="#0ea5e9" stroke-width="2" opacity=".35" class="dashMove"/>
    <path d="M1600 110 C1440 120,1380 180,1280 180 H1090" stroke="#38bdf8" stroke-width="2" opacity=".4" class="dashMove"/>
    <path d="M128 80 L220 80 L260 120" stroke="#60a5fa" stroke-width="2" opacity=".25" class="dashMove"/>
    <path d="M1470 430 L1385 430 L1335 390" stroke="#60a5fa" stroke-width="2" opacity=".25" class="dashMove"/>
  </g>

  <!-- particles -->
  <g fill="#38bdf8" filter="url(#glow)">
    <circle cx="120" cy="82" r="2.5" class="spark"/>
    <circle cx="310" cy="430" r="2.2" class="spark"/>
    <circle cx="520" cy="74" r="2.4" class="spark"/>
    <circle cx="1080" cy="66" r="2.4" class="spark"/>
    <circle cx="1290" cy="425" r="2.2" class="spark"/>
    <circle cx="1490" cy="118" r="2.5" class="spark"/>
  </g>

  <!-- left code card -->
  <g transform="translate(70 125)">
    <g class="float2">
    <rect class="panel" x="0" y="0" width="310" height="245" rx="22"/>
    <circle cx="48" cy="28" r="5" fill="#38bdf8"/>
    <circle cx="48" cy="28" r="5" fill="#60a5fa" opacity=".8"/>
    <circle cx="68" cy="28" r="5" fill="#2563eb" opacity=".8"/>
    <text x="28" y="62" class="mono" font-size="15" fill="#93c5fd">developer.cs</text>
    <g class="mono" font-size="15" fill="#38bdf8">
      <text x="28" y="96">public class Developer</text>
      <text x="28" y="126">{</text>
      <text x="48" y="156">Build();</text>
      <text x="48" y="186">Debug();</text>
      <text x="48" y="216">Optimize();</text>
      <text x="28" y="246">}</text>
    </g>
    <rect x="15" y="-75" width="280" height="60" fill="#38bdf8" opacity=".07" class="scan"/>
    </g>
  </g>

  <!-- right architecture card -->
  <g transform="translate(1220 125)">
    <g class="float">
    <rect class="panel" x="0" y="0" width="310" height="245" rx="22"/>
    <circle cx="28" cy="28" r="5" fill="#38bdf8"/>
    <circle cx="48" cy="28" r="5" fill="#60a5fa" opacity=".8"/>
    <circle cx="68" cy="28" r="5" fill="#2563eb" opacity=".8"/>
    <text x="28" y="62" class="mono" font-size="15" fill="#93c5fd">project structure</text>
    <g class="mono" font-size="15" fill="#60a5fa">
      <text x="28" y="98">src</text>
      <text x="48" y="128">├─ Core</text>
      <text x="48" y="158">├─ Application</text>
      <text x="48" y="188">├─ Infrastructure</text>
      <text x="48" y="218">└─ Presentation</text>
    </g>
    <rect x="42" y="109" width="190" height="24" rx="8" fill="#38bdf8" opacity=".10">
      <animate attributeName="y" values="109;139;169;199;109" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="15" y="-75" width="280" height="60" fill="#38bdf8" opacity=".07" class="scan"/>
    </g>
  </g>

  <!-- center logo -->
  <g transform="translate(800 112)">
    <g class="float">
    <circle r="78" fill="none" stroke="#38bdf8" stroke-opacity=".28" stroke-width="2"/>
    <circle r="98" fill="none" stroke="#38bdf8" stroke-opacity=".22" stroke-width="1.5" stroke-dasharray="4 10">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="20" text-anchor="middle" class="sans" font-size="94" font-weight="800" fill="#38bdf8" opacity=".9" filter="url(#glow)">OR</text>
    <circle r="4" fill="#7dd3fc">
      <animateMotion dur="7s" repeatCount="indefinite" path="M 0 -98 A 98 98 0 1 1 0 98 A 98 98 0 1 1 0 -98"/>
    </circle>
    </g>
  </g>

  <!-- center title -->
  <g text-anchor="middle">
    <text x="800" y="248" class="sans" font-size="82" font-weight="900" fill="#2563eb" opacity=".35" filter="url(#strongGlow)">Omar Refaey</text>
    <text x="800" y="248" class="sans" font-size="82" font-weight="900" fill="url(#titleGrad)">Omar Refaey</text>

    <line x1="455" y1="278" x2="625" y2="278" stroke="url(#lineGrad)" stroke-width="3" filter="url(#glow)"/>
    <line x1="975" y1="278" x2="1145" y2="278" stroke="url(#lineGrad)" stroke-width="3" filter="url(#glow)"/>

    <text x="800" y="288" class="mono" font-size="28" letter-spacing="5" fill="#22d3ee" filter="url(#glow)">FULL-STACK DEVELOPER</text>
  </g>

  <!-- skills row -->
  <g transform="translate(435 330)" class="sans">
    <g>
      <rect x="0" y="0" width="210" height="44" rx="22" fill="#08111f" fill-opacity=".75" stroke="#38bdf8" stroke-opacity=".3"/>
      <text x="105" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#e5f3ff">.NET Backend</text>
    </g>
    <g transform="translate(240 0)">
      <rect x="0" y="0" width="210" height="44" rx="22" fill="#08111f" fill-opacity=".75" stroke="#38bdf8" stroke-opacity=".3"/>
      <text x="105" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#e5f3ff">React Frontend</text>
    </g>
    <g transform="translate(480 0)">
      <rect x="0" y="0" width="210" height="44" rx="22" fill="#08111f" fill-opacity=".75" stroke="#38bdf8" stroke-opacity=".3"/>
      <text x="105" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#e5f3ff">SQL Server</text>
    </g>
  </g>

  <!-- architecture pill -->
  <g transform="translate(460 392)">
    <rect x="0" y="0" width="680" height="52" rx="26" fill="#08111f" fill-opacity=".78" stroke="#38bdf8" stroke-opacity=".28" stroke-width="1.5"/>
    <text x="340" y="33" text-anchor="middle" class="sans" font-size="22" font-weight="600" fill="#93c5fd">Clean Architecture  •  3-Tier  •  Repository Pattern</text>
    <circle cx="18" cy="26" r="4" fill="#38bdf8" class="pulse">
      <animate attributeName="cx" values="18;662;18" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- bottom terminal line -->
  <g transform="translate(530 474)">
    <text x="0" y="0" class="mono" font-size="18" fill="#38bdf8">
      <tspan class="typing1">$ dotnet build scalable-solutions</tspan>
    </text>
    <text x="360" y="0" class="mono blink" font-size="18" fill="#38bdf8">█</text>
  </g>

  <!-- decorative terminal corners -->
  <g opacity=".7" fill="none" stroke="#38bdf8" stroke-width="2" filter="url(#glow)">
    <path d="M62 450 v30 h30"/>
    <path d="M1538 450 v30 h-30"/>
  </g>
</svg>
